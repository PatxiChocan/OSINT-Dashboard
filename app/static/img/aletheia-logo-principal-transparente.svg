    <line x1="80"  y1="142" x2="80"  y2="154" stroke="#F0EDE6" stroke-width="1.4" stroke-linecap="square" stroke-opacity="0.85"/>
    <line x1="146" y1="43"  x2="135" y2="49"  stroke="#F0EDE6" stroke-width="1.4" stroke-linecap="square" stroke-opacity="0.85"/>
