    fill="#F0EDE6">ALETHEIA</text>
  <text x="197" y="255" text-anchor="middle"
    font-family="'VT323', monospace" font-size="62" letter-spacing="8"
    fill="#7F77DD" opacity="0.38" clip-path="url(#cut1)">ALETHEIA</text>
  <text x="203" y="255" text-anchor="middle"
    font-family="'VT323', monospace" font-size="62" letter-spacing="8"
    fill="#AFA9EC" opacity="0.28" clip-path="url(#cut2)">ALETHEIA</text>

  <!-- Scan line cuts — use white with low opacity instead of dark bg color -->
  <rect x="50" y="229" width="300" height="1.8" fill="white" opacity="0.04"/>
  <rect x="50" y="242" width="300" height="1.2" fill="white" opacity="0.03"/>

  <!-- Rule -->
  <line x1="120" y1="268" x2="280" y2="268" stroke="#7F77DD" stroke-opacity="0.5" stroke-width="0.8"/>
  <!-- Tagline -->
  <text x="200" y="284" text-anchor="middle"
    font-family="'Share Tech Mono', monospace" font-size="9" letter-spacing="3"
