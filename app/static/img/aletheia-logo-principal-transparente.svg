    <line x1="110" y1="114" x2="82"  y2="54"  stroke="#F0EDE6" stroke-width="3"   stroke-linecap="square"/>
    <line x1="58"  y1="90"  x2="73"  y2="90"  stroke="#F0EDE6" stroke-width="2.6" stroke-linecap="square"/>
