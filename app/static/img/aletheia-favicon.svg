  <polygon points="32,17.6 33.6,20 32,22.4 30.4,20"  fill="#7F77DD" fill-opacity="0.7"/>
  <!-- Brackets -->
  <path d="M 45.6 8.8 L 51.2 8.8 L 51.2 14.4" stroke="#7F77DD" stroke-width="0.7" stroke-linecap="square" stroke-opacity="0.6" fill="none"/>
  <path d="M 18.4 55.2 L 12.8 55.2 L 12.8 49.6" stroke="#7F77DD" stroke-width="0.7" stroke-linecap="square" stroke-opacity="0.6" fill="none"/>
  <!-- Side diamonds -->
  <polygon points="57.6,32 59.2,33.6 57.6,35.2 56,33.6" fill="#7F77DD" fill-opacity="0.35"/>
  <polygon points="6.4,32  8,33.6   6.4,35.2 4.8,33.6"  fill="#7F77DD" fill-opacity="0.35"/>
